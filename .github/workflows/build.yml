name: Android Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Activate pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.12.3 --activate

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust (stable + Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: 27.0.12077973

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate Gradle wrapper (if missing)
        run: pnpm exec tauri android init
        working-directory: src-tauri

      - name: Prepare keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/upload-keystore.jks

      - name: Build Android (AAB + APK)
        run: pnpm exec tauri build --target android
        working-directory: src-tauri
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: src-tauri/target/android/bundle/**/*.aab
          if-no-files-found: error

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/target/android/apk/**/*.apk
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: find ./artifacts -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
