name: Android Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]

jobs:
  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android env
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Install NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.14206865"

      - name: Set NDK env
        run: |
          NDK_DIR=$(ls -d $ANDROID_HOME/ndk/* | head -n1)
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          BIN=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin
          echo "$BIN" >> $GITHUB_PATH

      - name: Init Android project (Tauri)
        run: pnpm exec tauri android init
        working-directory: src-tauri

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/upload-keystore.jks

      - name: Build Android (SIGNED)
        run: pnpm exec tauri android build
        working-directory: src-tauri
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          SIGNING_STORE_PATH: upload-keystore.jks
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Verify APK signing
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" | head -1)
          echo "APK: $APK"
          $ANDROID_HOME/build-tools/*/apksigner verify --verbose "$APK"

      - name: List outputs
        run: |
          find src-tauri/gen/android/app/build/outputs -type f | sort

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: src-tauri/gen/android/app/build/outputs/bundle/**/**/*.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk

  release:
    needs: android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}