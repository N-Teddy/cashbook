name: Android Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@9 && pnpm --version

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust (stable + Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK and NDK
        id: setup-android
        uses: android-actions/setup-android@v3
        with:
          ndk: 29

      - name: Set Android SDK env
        run: echo "ANDROID_HOME=${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}" >> "$GITHUB_ENV"

      - name: Init Android Gradle project
        run: pnpm exec tauri android init
        working-directory: src-tauri

      - name: Prepare keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/upload-keystore.jks

      - name: Expose NDK toolchain on PATH
        run: |
          NDK_DIR=$(ls -d "$ANDROID_HOME/ndk/"* | head -n1)
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> "$GITHUB_ENV"
          echo "$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Set Rust Android linker
        run: |
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=aarch64-linux-android-clang" >> "$GITHUB_ENV"
          echo "CC_aarch64-linux-android=aarch64-linux-android-clang" >> "$GITHUB_ENV"
          echo "CXX_aarch64-linux-android=aarch64-linux-android-clang++" >> "$GITHUB_ENV"

      - name: Build Android (AAB + APK)
        run: pnpm exec tauri build --target aarch64-linux-android
        working-directory: src-tauri
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: src-tauri/target/aarch64-linux-android/release/bundle/**/*.aab
          if-no-files-found: error

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/target/aarch64-linux-android/release/apk/**/*.apk
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: find ./artifacts -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
